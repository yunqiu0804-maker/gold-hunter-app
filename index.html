<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金猎手秋天版</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>黄金猎手秋天版</h1>
    <div class="prices">
      <span>人民币/克: <span id="gold-cny">--</span></span>
      <span>国际金价 USD/oz: <span id="gold-usd">--</span></span>
    </div>
  </header>

  <main>
    <section class="chart-section">
      <div class="period-buttons">
        <button onclick="updateChartPeriod('24h')">24小时</button>
        <button onclick="updateChartPeriod('1m')">1个月</button>
        <button onclick="updateChartPeriod('6m')">6个月</button>
        <button onclick="updateChartPeriod('1y')">1年</button>
      </div>
      <canvas id="goldChart"></canvas>
    </section>

    <section class="holding-section">
      <h2>持仓盈亏计算</h2>
      <input type="number" id="holding-grams" placeholder="输入克数">
      <button id="calculate">计算总价值</button>
      <p>总价值：<span id="total-value">--</span> 元</p>
    </section>

    <section class="trade-section">
      <h2>交易记录</h2>
      <ul id="records-list"></ul>
      <button id="add-trade">添加交易</button>
    </section>

    <section class="alert-section">
      <h2>价格提醒</h2>
      <input type="number" id="alert-price" placeholder="输入提醒价格(元/克)">
      <button id="set-alert">设置提醒</button>
    </section>
  </main>

  <footer>
    <p>© 黄金猎手秋天版</p>
  </footer>

<script src="app.js"></script>
</body>
</html>
